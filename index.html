<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>台北 × 日本都會區 軌道路網疊圖</title>
<style>
:root{
  --canvas:#F6F7F4; --ink:#1B1D21; --ink2:#5C6066; --ink3:#9BA0A6;
  --panel:#FFFFFF; --hair:#E1E3E0; --hair2:#CDD0CC; --ring:#C9CCC7; --halo:#F6F7F4;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --canvas:#121417; --ink:#E7E8E9; --ink2:#A8ACB2; --ink3:#6C7076;
    --panel:#1A1D21; --hair:#2A2E33; --hair2:#3A3F45; --ring:#33373D; --halo:#121417;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--canvas);color:var(--ink)}
#map{position:absolute;inset:0;touch-action:none;cursor:grab}
#map.dragging{cursor:grabbing}
#map canvas{display:block;width:100%;height:100%}
#title{position:absolute;top:14px;left:16px;pointer-events:none;z-index:5}
#title h1{font-size:15px;font-weight:600;letter-spacing:.04em}
#title p{font-size:11.5px;color:var(--ink2);margin-top:2px;font-family:var(--mono)}
#panel{position:absolute;top:64px;left:16px;width:238px;max-height:calc(100% - 150px);overflow-y:auto;
  background:var(--panel);border:1px solid var(--hair);border-radius:10px;z-index:6;scrollbar-width:thin}
#panel section{padding:10px 12px;border-bottom:1px solid var(--hair)}
#panel section:last-child{border-bottom:none}
#panel h2{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.12em;margin-bottom:8px}
.row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px;cursor:pointer}
.row input{width:14px;height:14px;accent-color:var(--ink);flex:none}
.chip{width:14px;height:4px;border-radius:2px;flex:none}
.chip.hollow{height:6px;background:transparent!important;border:1.5px solid}
.row .cnt{margin-left:auto;font-size:10.5px;color:var(--ink3);font-family:var(--mono)}
select{width:100%;padding:6px 8px;font-size:12.5px;font-family:var(--sans);color:var(--ink);
  background:var(--canvas);border:1px solid var(--hair2);border-radius:6px;outline:none}
.anchor-note{font-size:11px;color:var(--ink2);margin-top:6px;line-height:1.55}
.anchor-note b{font-weight:600;color:var(--ink)}
#panelToggle{position:absolute;top:64px;left:16px;z-index:7;width:34px;height:34px;border-radius:8px;
  background:var(--panel);border:1px solid var(--hair);color:var(--ink);font-size:16px;cursor:pointer;display:none}
details{font-size:11.5px;color:var(--ink2);line-height:1.7}
details summary{cursor:pointer;font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.12em;list-style:none}
details summary::before{content:"▸ "}
details[open] summary::before{content:"▾ "}
details table{width:100%;border-collapse:collapse;margin-top:6px;font-family:var(--mono);font-size:10.5px}
details td{padding:2px 0;border-bottom:1px dotted var(--hair)}
details td:last-child{text-align:right}
#status{position:absolute;left:0;right:0;bottom:0;z-index:6;display:flex;flex-wrap:wrap;gap:4px 20px;
  align-items:baseline;padding:9px 16px;background:var(--panel);border-top:1px solid var(--hair);
  font-family:var(--mono);font-size:11.5px;color:var(--ink2);min-height:38px}
#status b{color:var(--ink);font-weight:600}
#status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:1px}
#zoomer{position:absolute;right:16px;bottom:56px;z-index:6;display:flex;flex-direction:column;gap:1px;
  border:1px solid var(--hair);border-radius:8px;overflow:hidden;background:var(--hair)}
#zoomer button{width:34px;height:34px;border:none;background:var(--panel);color:var(--ink);font-size:17px;cursor:pointer}
#zoomer button:active{background:var(--canvas)}
#scalebar{position:absolute;right:64px;bottom:56px;z-index:5;font-family:var(--mono);font-size:10.5px;
  color:var(--ink2);text-align:right;pointer-events:none}
#scalebar .bar{height:4px;border:1px solid var(--ink2);border-top:none;margin-top:2px}
#attrib{position:absolute;left:8px;bottom:44px;z-index:5;font-size:9.5px;color:var(--ink3);
  background:color-mix(in srgb, var(--canvas) 70%, transparent);padding:1px 6px;border-radius:4px;pointer-events:none}
#tip{position:absolute;pointer-events:none;display:none;z-index:9;background:var(--panel);
  border:1px solid var(--hair2);border-radius:8px;padding:8px 11px;font-size:12px;line-height:1.6;
  max-width:250px;box-shadow:0 3px 14px rgba(0,0,0,.13)}
#tip .t-line{font-size:10.5px;color:var(--ink3);font-family:var(--mono)}
#tip .t-name{font-weight:600;font-size:13px}
#tip .t-map{margin-top:4px;padding-top:4px;border-top:1px dotted var(--hair2);color:var(--ink2);font-size:11.5px}
#tip .t-map b{color:var(--ink)}
@media (max-width:640px){
  #panel{width:min(238px, calc(100vw - 32px));display:none}
  #panel.open{display:block}
  #panelToggle{display:block}
  #title p{display:none}
  #status{font-size:10.5px;gap:2px 14px;padding:7px 12px}
}
</style>
</head>

uc":true,"alpha":0.85}],"analysisHtml":"台北捷運 118 站（不含機捷）幾何重心距台北車站僅 <b>253 m</b>——台北車站本身就是路網重心。<br>\n各對照城市核心路網重心 vs 台北車站對位的殘餘偏移：<br>\n<table>\n<tr><td>東京（229站核心）</td><td></td></tr>\n<tr><td>　飯田橋</td><td>0.38 km</td></tr>\n<tr><td>　大手町</td><td>2.29 km</td></tr>\n<tr><td>　東京駅</td><td>2.65 km</td></tr>\n<tr><td>　新宿</td><td>4.18 km</td></tr>\n<tr><td>名古屋（86站核心）</td><td></td></tr>\n<tr><td>　栄</td><td>2.41 km</td></tr>\n<tr><td>　名古屋駅</td><td>4.46 km</td></tr>\n<tr><td>京阪神（大阪核心 126 站）</td><td></td></tr>\n<tr><td>　大阪駅</td><td>2.97 km</td></tr>\n<tr><td>　なんば</td><td>1.44 km</td></tr>\n</table>\n重心為幾何平均（各站等權）；京阪神為多中心都會，殘餘偏移僅供參考。核心路網＝北捷 vs 各市地鐵（東京含都營＋山手，大阪含北急＋環狀線）。","subtitle":"等距投影・台北側 269 站（含興建中）/ 日本側 2610 站（東京・名古屋・京阪神）・資料 2025-03 / 2026-05 / 2026-07"};

const KY=110.574;
function makeProj(lat0,lng0){const kx=111.320*Math.cos(lat0*Math.PI/180);return (lat,lng)=>[(lng-lng0)*kx,(lat-lat0)*KY];}
const projs={tp:makeProj(DATA.tpOrigin[0],DATA.tpOrigin[1])};
for(const c of DATA.cities) projs[c.id]=makeProj(c.base[0],c.base[1]);

const css=getComputedStyle(document.documentElement);
const C={};
for(const k of ['canvas','ink','ink2','ink3','ring','halo']) C[k]=css.getPropertyValue('--'+k).trim();

const layerOn={_lm:true,_rings:true};
const lines=DATA.lines.map(L=>{
  const proj=projs[L.city==='tp'?'tp':L.city];
  const pts=L.st.map(s=>proj(s[1],s[2]));
  layerOn[L.key]=L.on!==false;
  return {...L, pts};
});
const stations=[];
for(const L of lines){
  L.st.forEach((s,i)=>{
    stations.push({n:s[0], nn:s[0].replace(/\(.*?\)|（.*?）/,''), x:L.pts[i][0], y:L.pts[i][1],
      tier:s[3], city:L.city, line:L.name, color:L.color, key:L.key, uc:L.uc});
  });
}
const lmByCity={};
for(const c of DATA.cities){
  lmByCity[c.id]=c.landmarks.map(lm=>{
    const p=projs[c.id](lm[1],lm[2]);
    return {n:lm[0], nn:lm[0], x:p[0], y:p[1], city:c.id, line:c.name+'地標', color:C.ink2, key:'_lm', tier:1};
  });
}
const tpPts=stations.filter(s=>s.city==='tp');
const remByCity={};
for(const c of DATA.cities) remByCity[c.id]=stations.filter(s=>s.city===c.id).concat(lmByCity[c.id]);

let activeCity=DATA.cities[0].id;
let cityObj=DATA.cities[0];
let rmOff=[0,0], anchorName='';
function setAnchor(id){
  const a=cityObj.anchors.find(a=>a.id===id);
  const p=projs[activeCity](a.lat,a.lng);
  rmOff=[-p[0],-p[1]];
  anchorName=`台北車站 ⟺ ${a.name}`;
  document.getElementById('anchorNote').innerHTML =
    `<b>${anchorName}</b><br>${a.desc}<br>對齊後兩路網重心殘餘偏移 <b>${a.residual.toFixed(2)} km</b>`;
  dirty();
}

const mapDiv=document.getElementById('map'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let vw=0, vh=0, dpr=Math.min(window.devicePixelRatio||1, 2);
let scale=1, tx=0, ty=0;
let needsRender=false, slowFrames=0, checkedPerf=false;

function resize(){
  vw=mapDiv.clientWidth; vh=mapDiv.clientHeight;
  cv.width=Math.round(vw*dpr); cv.height=Math.round(vh*dpr);
  dirty();
}
function fit(){
  resize();
  scale=Math.min(vw,vh)/34;
  tx=vw/2; ty=vh/2;
  dirty();
}
function dirty(){
  if(!needsRender){needsRender=true; requestAnimationFrame(render);}
}

const FONT='"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif';
let baseMode='tp';
const TILE_STYLE=matchMedia('(prefers-color-scheme: dark)').matches?'dark_all':'light_all';
const tileCache=new Map();
function drawBasemap(){
  if(baseMode==='off')return;
  const isTp=baseMode==='tp';
  const B=isTp?DATA.tpOrigin:cityObj.base;
  const lat0=B[0], lng0=B[1];
  const kx=111.32*Math.cos(lat0*Math.PI/180);
  const ox=isTp?0:rmOff[0], oy=isTp?0:rmOff[1];
  const kmW=(0-tx)/scale, kmE=(vw-tx)/scale, kmN=ty/scale, kmS=(ty-vh)/scale;
  const lngW=lng0+(kmW-ox)/kx, lngE=lng0+(kmE-ox)/kx;
  const latN=Math.min(84,lat0+(kmN-oy)/KY), latS=Math.max(-84,lat0+(kmS-oy)/KY);
  const z=Math.max(3,Math.min(17,Math.round(Math.log2(40075*Math.cos(lat0*Math.PI/180)*scale/256))));
  const n=1<<z;
  const l2ty=lat=>{const r=lat*Math.PI/180;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n;};
  const ty2l=y=>Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI;
  const X0=Math.max(0,Math.floor((lngW+180)/360*n)), X1=Math.min(n-1,Math.floor((lngE+180)/360*n));
  const Y0=Math.max(0,Math.floor(l2ty(latN))), Y1=Math.min(n-1,Math.floor(l2ty(latS)));
  if((X1-X0+1)*(Y1-Y0+1)>100)return;
  ctx.globalAlpha=0.55;
  for(let X=X0;X<=X1;X++)for(let Y=Y0;Y<=Y1;Y++){
    const key=TILE_STYLE+z+'/'+X+'/'+Y;
    let img=tileCache.get(key);
    if(!img){
      img=new Image(); img.crossOrigin='anonymous';
      img.onload=dirty; img.onerror=()=>{};
      img.src='https://basemaps.cartocdn.com/'+TILE_STYLE+'/'+z+'/'+X+'/'+Y+'.png';
      tileCache.set(key,img);
      if(tileCache.size>500) tileCache.delete(tileCache.keys().next().value);
    }
    if(!img.complete||!img.naturalWidth)continue;
    const w=X/n*360-180, e=(X+1)/n*360-180, no=ty2l(Y), so=ty2l(Y+1);
    const sx=tx+((w-lng0)*kx+ox)*scale, ex=tx+((e-lng0)*kx+ox)*scale;
    const sy=ty-((no-lat0)*KY+oy)*scale, ey=ty-((so-lat0)*KY+oy)*scale;
    ctx.drawImage(img,sx,sy,ex-sx+0.5,ey-sy+0.5);
  }
  ctx.globalAlpha=1;
}

function render(){
  needsRender=false;
  const t0=performance.now();
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,vw,vh);
  drawBasemap();
  const ox=rmOff[0], oy=rmOff[1];
  const X=x=>tx+x*scale, Y=y=>ty-y*scale;
  const inView=(sx,sy,m)=>sx>-m&&sx<vw+m&&sy>-m&&sy<vh+m;

  if(layerOn._rings){
    ctx.strokeStyle=C.ring; ctx.lineWidth=1; ctx.setLineDash([3,5]);
    ctx.fillStyle=C.ink3; ctx.font='10.5px '+FONT; ctx.textAlign='left';
    for(const r of [5,10,15,20,30,40,50,75,100,150,200,300,400,500]){
      const rp=r*scale;
      if(rp<8 || rp>Math.hypot(vw,vh)+Math.hypot(tx-vw/2,ty-vh/2)+800) continue;
      ctx.beginPath(); ctx.arc(tx,ty,rp,0,6.2832); ctx.stroke();
      ctx.fillText(r+' km', tx+rp*0.7071+4, ty-rp*0.7071-4);
    }
    ctx.setLineDash([]);
  }

  for(const pass of ['rm','tp']){
    for(const L of lines){
      const isRm=L.city!=='tp';
      if((pass==='rm')!==isRm || !layerOn[L.key]) continue;
      if(isRm && L.city!==activeCity) continue;
      const lx=isRm?ox:0, ly=isRm?oy:0;
      ctx.strokeStyle=L.color;
      ctx.globalAlpha=L.alpha||(isRm?0.4:0.95);
      ctx.lineWidth=L.w||(isRm?3.4:2.4);
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.setLineDash(L.dash?[6,5]:[]);
      for(const path of L.paths){
        ctx.beginPath();
        let px=1e9,py=1e9;
        for(let j=0;j<path.length;j++){
          const p=L.pts[path[j]];
          const sx=X(p[0]+lx), sy=Y(p[1]+ly);
          if(j&&j<path.length-1&&Math.abs(sx-px)+Math.abs(sy-py)<1.5) continue;
          j?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);
          px=sx;py=sy;
        }
        ctx.stroke();
      }
    }
    ctx.setLineDash([]); ctx.globalAlpha=1;
    const isRm=pass==='rm';
    const r=isRm?3.2:3.8, lx=isRm?ox:0, ly=isRm?oy:0;
    if(!(isRm && scale<8)){
      ctx.lineWidth=1.4;
      for(const L of lines){
        if((pass==='rm')!==(L.city!=='tp') || !layerOn[L.key]) continue;
        if(isRm && L.city!==activeCity) continue;
        ctx.beginPath();
        let any=false;
        for(const p of L.pts){
          const sx=X(p[0]+lx), sy=Y(p[1]+ly);
          if(!inView(sx,sy,10)) continue;
          ctx.moveTo(sx+r,sy); ctx.arc(sx,sy,r,0,6.2832); any=true;
        }
        if(!any) continue;
        if(isRm||L.uc){ctx.fillStyle=C.canvas; ctx.fill(); ctx.strokeStyle=L.color; ctx.stroke();}
        else{ctx.fillStyle=L.color; ctx.fill(); ctx.strokeStyle=C.halo; ctx.stroke();}
      }
    }
  }

  if(layerOn._lm){
    ctx.fillStyle=C.ink2;
    for(const lm of lmByCity[activeCity]){
      const sx=X(lm.x+ox), sy=Y(lm.y+oy);
      if(!inView(sx,sy,10)) continue;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(Math.PI/4); ctx.fillRect(-3.4,-3.4,6.8,6.8); ctx.restore();
    }
  }

  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.lineJoin='round'; ctx.strokeStyle=C.canvas; ctx.lineWidth=3;
  function label(txt,sx,sy,size,color,bold){
    ctx.font=(bold?'600 ':'')+size+'px '+FONT;
    ctx.strokeText(txt,sx,sy); ctx.fillStyle=color; ctx.fillText(txt,sx,sy);
  }
  const minTier = scale>=45?0 : scale>=16?1 : 2;
  let budget=450;
  for(const s of stations){
    if(s.tier<minTier || !layerOn[s.key]) continue;
    const isRm=s.city!=='tp';
    if(isRm && s.city!==activeCity) continue;
    const lx=isRm?ox:0, ly=isRm?oy:0;
    const sx=X(s.x+lx)+6, sy=Y(s.y+ly)-7;
    if(!inView(sx,sy,60)) continue;
    label(s.nn,sx,sy, s.tier?12:10.5, isRm?C.ink2:C.ink, s.tier===2);
    if(--budget<=0) break;
  }
  if(layerOn._lm && scale>=8){
    for(const lm of lmByCity[activeCity]){
      const sx=X(lm.x+ox)+7, sy=Y(lm.y+oy)+1;
      if(!inView(sx,sy,60)) continue;
      label(lm.n,sx,sy,10.5,C.ink2,false);
    }
  }

  ctx.beginPath(); ctx.arc(tx,ty,5.5,0,6.2832);
  ctx.fillStyle=C.ink; ctx.fill(); ctx.strokeStyle=C.halo; ctx.lineWidth=2; ctx.stroke();
  label(anchorName, tx+9, ty+1, 13, C.ink, true);

  updateScalebar();
  if(!checkedPerf){
    if(performance.now()-t0>24 && ++slowFrames>4 && dpr>1){dpr=1; checkedPerf=true; resize();}
  }
}

function updateScalebar(){
  const km=90/scale;
  const nice=[0.2,0.5,1,2,5,10,20,50].reduce((a,b)=>Math.abs(b-km)<Math.abs(a-km)?b:a);
  document.getElementById('scaletxt').textContent=nice<1?nice*1000+' m':nice+' km';
  document.getElementById('scalerule').style.width=(nice*scale)+'px';
}
function scr2km(px,py){return [(px-tx)/scale, (ty-py)/scale];}

let pointers=new Map(), lastDist=0;
mapDiv.addEventListener('pointerdown',e=>{
  mapDiv.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,[e.clientX,e.clientY]);
  mapDiv.classList.add('dragging');
});
mapDiv.addEventListener('pointermove',e=>{
  if(pointers.has(e.pointerId)){
    const prev=pointers.get(e.pointerId);
    if(pointers.size===1){
      tx+=e.clientX-prev[0]; ty+=e.clientY-prev[1]; dirty();
    }
    pointers.set(e.pointerId,[e.clientX,e.clientY]);
    if(pointers.size===2){
      const ps=[...pointers.values()];
      const d=Math.hypot(ps[0][0]-ps[1][0],ps[0][1]-ps[1][1]);
      if(lastDist>0) zoomAt((ps[0][0]+ps[1][0])/2,(ps[0][1]+ps[1][1])/2, d/lastDist);
      lastDist=d;
    }
  }
  queueHover(e.clientX,e.clientY);
});
function endPointer(e){pointers.delete(e.pointerId); lastDist=0; if(!pointers.size)mapDiv.classList.remove('dragging');}
mapDiv.addEventListener('pointerup',endPointer);
mapDiv.addEventListener('pointercancel',endPointer);
mapDiv.addEventListener('wheel',e=>{
  e.preventDefault();
  zoomAt(e.clientX,e.clientY, Math.exp(-e.deltaY*0.0016));
},{passive:false});
function zoomAt(px,py,f){
  const ns=Math.min(Math.max(scale*f,1.2),900);
  f=ns/scale;
  tx=px-(px-tx)*f; ty=py-(py-ty)*f; scale=ns; dirty();
}
document.getElementById('zin').onclick=()=>zoomAt(vw/2,vh/2,1.45);
document.getElementById('zout').onclick=()=>zoomAt(vw/2,vh/2,1/1.45);
document.getElementById('zfit').onclick=fit;
addEventListener('resize',resize);

const tip=document.getElementById('tip'), statusDiv=document.getElementById('status');
const dirs=['北','北北東','東北','東北東','東','東南東','東南','南南東','南','南南西','西南','西南西','西','西北西','西北','北北西','北'];
function fmtVec(x,y){
  const km=Math.hypot(x,y);
  const ang=(Math.atan2(x,y)*180/Math.PI+360)%360;
  return `${km.toFixed(2)} km・${dirs[Math.round(ang/22.5)]}`;

function nearest(arr,x,y,useOff){
  let best=null,bd=1e9;
  for(const r of arr){
    if(!layerOn[r.key]) continue;
    const rx=r.x+(useOff?rmOff[0]:0), ry=r.y+(useOff?rmOff[1]:0);
    const d=(rx-x)**2+(ry-y)**2;
    if(d<bd){bd=d;best=r;}
  }
  return [best,Math.sqrt(bd)];
}
let hoverQueued=false, hx=0, hy=0;
function queueHover(px,py){
  hx=px; hy=py;
  if(!hoverQueued){hoverQueued=true; requestAnimationFrame(doHover);}
}
function doHover(){
  hoverQueued=false;
  const [x,y]=scr2km(hx,hy);
  const rem=remByCity[activeCity];
  const [ntp,dtp]=nearest(tpPts,x,y,false);
  const [nrm,drm]=nearest(rem,x,y,true);
  let hit=null, hd=1e9;
  if(ntp && dtp*scale<12){hit=ntp; hd=dtp;}
  if(nrm && drm*scale<12 && drm<hd){hit=nrm;}
  if(hit){
    const isRm=hit.city!=='tp';
    const px_=hit.x+(isRm?rmOff[0]:0), py_=hit.y+(isRm?rmOff[1]:0);
    const [n,d]=isRm?nearest(tpPts,px_,py_,false):nearest(rem,px_,py_,true);
    const dd=d<1?(d*1000).toFixed(0)+' m':d.toFixed(2)+' km';
    tip.innerHTML=`<div class="t-line" style="color:${hit.color}">● ${hit.line}</div>
      <div class="t-name">${hit.nn}</div>
      <div class="t-line">距基準點 ${fmtVec(px_,py_)}</div>
      <div class="t-map">疊在${isRm?'台北':cityObj.short}：<b>${n?n.nn:'—'}</b> 附近（差 ${dd}）</div>`;
    tip.style.display='block';
    tip.style.left=Math.min(hx+14, vw-tip.offsetWidth-10)+'px';
    tip.style.top=Math.min(hy+16, vh-tip.offsetHeight-50)+'px';
    mapDiv.style.cursor='pointer';
  }else{
    tip.style.display='none';
    mapDiv.style.cursor='';
  }
  if(ntp&&nrm) statusDiv.innerHTML=
    `<span>距基準點 <b>${fmtVec(x,y)}</b></span>`+
    `<span><span class="dot" style="background:${ntp.color}"></span>台北最近：<b>${ntp.nn}</b> ${dtp.toFixed(1)} km</span>`+
    `<span><span class="dot" style="background:${nrm.color}"></span>${cityObj.short}最近：<b>${nrm.nn}</b> ${drm.toFixed(1)} km</span>`;
}
statusDiv.innerHTML=`<span>移動游標查看雙城對位・滾輪縮放・拖曳平移・懸停車站看「疊在對面城市的哪裡」</span>`;

function mkToggle(container,label,color,hollow,cnt,fn,checked=true){
  const row=document.createElement('label'); row.className='row';
  row.innerHTML=`<input type="checkbox" ${checked?'checked':''}>
    <span class="chip ${hollow?'hollow':''}" style="${hollow?'border-color':'background'}:${color}"></span>
    <span>${label}</span>${cnt?`<span class="cnt">${cnt}</span>`:''}`;
  row.querySelector('input').addEventListener('change',e=>fn(e.target.checked));
  container.appendChild(row);
}
function buildGroups(box, ls){
  box.innerHTML='';
  const groups=new Map();
  for(const L of ls){
    if(!groups.has(L.grp)) groups.set(L.grp,[]);
    groups.get(L.grp).push(L);
  }
  for(const [gname,items] of groups){
    const head=document.createElement('label');
    head.className='row'; head.style.cssText='font-weight:600;margin-top:4px';
    const master=document.createElement('input'); master.type='checkbox';
    head.appendChild(master);
    head.insertAdjacentHTML('beforeend',`<span>${gname}</span>`);
    box.appendChild(head);
    const childInputs=[];
    for(const L of items){
      mkToggle(box,L.name,L.color,L.city!=='tp'&&!L.uc,L.st.length+'站',
        on=>{layerOn[L.key]=on; sync(); dirty();}, layerOn[L.key]);
      childInputs.push({input:box.lastChild.querySelector('input'), key:L.key});
    }
    function sync(){master.checked=childInputs.some(c=>layerOn[c.key]);}
    sync();
    master.addEventListener('change',()=>{
      for(const c of childInputs){c.input.checked=master.checked; layerOn[c.key]=master.checked;}
      dirty();
    });
  }
}
const tpBox=document.getElementById('tpToggles'), tkBox=document.getElementById('tkToggles');
buildGroups(tpBox, DATA.lines.filter(L=>L.city==='tp'));
const miscBox=document.getElementById('miscToggles');
mkToggle(miscBox,'地標',C.ink2,false,'',on=>{layerOn._lm=on; dirty();});
mkToggle(miscBox,'距離同心圓',C.ring,false,'',on=>{layerOn._rings=on; dirty();});

const citySel=document.getElementById('citySel'), sel=document.getElementById('anchorSel');
for(const c of DATA.cities){
  const o=document.createElement('option'); o.value=c.id; o.textContent=c.name;
  citySel.appendChild(o);
}
function setCity(id){
  activeCity=id;
  cityObj=DATA.cities.find(c=>c.id===id);
  document.getElementById('tkHead').textContent=cityObj.name+'圖層';
  sel.innerHTML='';
  for(const a of cityObj.anchors){
    const o=document.createElement('option'); o.value=a.id; o.textContent=`${a.name} — ${a.tag}`;
    sel.appendChild(o);
  }
  buildGroups(tkBox, DATA.lines.filter(L=>L.city===id));
  setAnchor(cityObj.anchors[0].id);
}
citySel.addEventListener('change',()=>setCity(citySel.value));
sel.addEventListener('change',()=>setAnchor(sel.value));

const baseSel=document.getElementById('baseSel'), attrib=document.getElementById('attrib');
function applyBase(){
  baseMode=baseSel.value==='rm'?'rm':baseSel.value;
  attrib.style.display=baseMode==='off'?'none':'block';
  dirty();
}
baseSel.addEventListener('change',applyBase);

document.getElementById('analysisBody').innerHTML=DATA.analysisHtml;
document.getElementById('subtitle').textContent=DATA.subtitle;
document.getElementById('panelToggle').onclick=()=>document.getElementById('panel').classList.toggle('open');

setCity(DATA.cities[0].id);
applyBase();
fit();
</script>
